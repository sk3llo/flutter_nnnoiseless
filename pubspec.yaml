name: flutter_nnnoiseless
description: "Recurrent neural network for audio noise reduction ."
repository: https://github.com/sk3llo/flutter_nnnoiseless.git
version: 1.4.0

environment:
  sdk: ^3.7.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  flutter_web_plugins:
    sdk: flutter
  path: ^1.9.1
  wav: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  ffi: ^2.0.2
  ffigen: 19.0.0
  integration_test:
    sdk: flutter

topics:
  - 'audio'
  - 'noise'
  - 'recurrent-neural-network'
  - 'artificial-intelligence'

flutter:
  uses-material-design: true
  # The wasm build of the Rust crate, bundled so web apps work with zero
  # setup. Loaded from assets/packages/flutter_nnnoiseless/web/pkg/ at
  # runtime; adds ~540KB of (unused) assets to non-web app bundles.
  assets:
    - web/pkg/rust_lib_flutter_nnnoiseless.js
    - web/pkg/rust_lib_flutter_nnnoiseless_bg.wasm
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      web:
        pluginClass: FlutterNnnoiselessWeb
        fileName: flutter_nnnoiseless_web.dart